services:
  web:
    build: ./backend
    container_name: rabivault_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      - db
      - redis
      - minio
      - clamav

  worker:
    build: ./backend
    container_name: rabivault_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
      - clamav

  db:
    image: postgres:16
    container_name: rabivault_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rabivault_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: rabivault_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: rabivault_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - rabivault_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  clamav:
    image: clamav/clamav:stable
    container_name: rabivault_clamav
    ports:
      - "3310:3310"
  
  backup:
    image: postgres:16
    container_name: rabivault_backup
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db
    entrypoint: ["sleep", "infinity"]

volumes:
  rabivault_postgres_data:
  rabivault_minio_data:
