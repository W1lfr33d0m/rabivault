services:
  web:
    build: ./backend
    container_name: rabivault_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio

  worker:
    build: ./backend
    container_name: rabivault_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio

  db:
    image: postgres:16
    container_name: rabivault_db
    environment:
      POSTGRES_DB: rabivault
      POSTGRES_USER: rabivault_user
      POSTGRES_PASSWORD: rabivault*2026
    volumes:
      - rabivault_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: rabivault_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: rabivault_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rabivault_minio
      MINIO_ROOT_PASSWORD: rabivault*2026
    volumes:
      - rabivault_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  rabivault_postgres_data:
  rabivault_minio_data:
