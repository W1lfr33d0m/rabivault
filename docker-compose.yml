services:
  web:
    build: ./backend
    container_name: rabivault_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py ensure_minio_bucket &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build: ./backend
    container_name: rabivault_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      clamav:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  db:
    image: postgres:16
    container_name: rabivault_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - rabivault_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: rabivault_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: rabivault_minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - rabivault_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc
    container_name: rabivault_minio_init
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${AWS_STORAGE_BUCKET_NAME} &&
      echo MinIO bucket ready: $${AWS_STORAGE_BUCKET_NAME}
      "

  clamav:
    image: clamav/clamav:stable
    container_name: rabivault_clamav
    ports:
      - "3310:3310"

  backup:
    image: postgres:16
    container_name: rabivault_backup
    volumes:
      - ./backups:/backups
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sleep", "infinity"]

  orthanc:
    image: orthancteam/orthanc
    container_name: rabivault_orthanc
    env_file:
      - .env
    environment:
      ORTHANC__NAME: "RabiVault Orthanc"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__REGISTERED_USERS: |-
        {"${ORTHANC_USERNAME}":"${ORTHANC_PASSWORD}"}
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"
      ORTHANC__DICOM_SERVER_ENABLED: "true"
      ORTHANC__DICOM_AET: "${ORTHANC_AET}"
      ORTHANC__DICOM_PORT: "4242"
      ORTHANC__HTTP_PORT: "8042"
    volumes:
      - rabivault_orthanc_data:/var/lib/orthanc/db
    ports:
      - "8042:8042"
      - "4242:4242"

volumes:
  rabivault_postgres_data:
  rabivault_minio_data:
  rabivault_orthanc_data:
